<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dr Pepper | Always One of a Kind</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="main-header" id="header">
        <nav class="nav-container">
            <div class="logo" style="font-weight:900; font-size: 1.5rem; color: #F4E8D8;">DR PEPPER</div>
            <ul class="nav-links">
                <li><a href="#flavors">Flavors</a></li>
                <li><a href="#story">Our Story</a></li>
                <li><a href="#locator">Find Dr Pepper</a></li>
            </ul>
            <button class="cta-join">Join the Club</button>
        </nav>
    </header>

   <main>
    <section class="hero" id="home">
        <div class="bubble-container" id="bubbleContainer"></div>
        <div class="hero-content">
            <img src="can.png" alt="Dr Pepper Can" class="hero-image">
            <h1 class="reveal-text">23 Flavors.<br><span class="highlight">One of a Kind.</span></h1>
            <p class="fade-in">Discover the taste that's always been unapologetically different.</p>
            <div class="hero-btns">
                <a href="#flavors" class="btn-primary">Explore Flavors</a>
            </div>
        </div>
    </section>

    <section id="flavors" class="flavor-section">
        <h2>The Mystery of 23</h2>
        <p>Click on a bubble to reveal the secret notes!</p>
        <div class="flavor-grid" id="flavorGrid"></div>
    </section>
</main>

    <script src="script.js"></script>
</body>
</html>
